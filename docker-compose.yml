services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: miku-postgres
    environment:
      POSTGRES_USER: miku
      POSTGRES_PASSWORD: miku
      POSTGRES_DB: miku
    ports:
      - "5432:5432"
    volumes:
      - miku_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miku -d miku"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  miku-backend:
    build: ./backend
    container_name: miku-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./assets:/app/assets
      # 모델 캐시 등을 위해 로컬 디렉토리 마운트 권장
      - ~/.cache/huggingface:/root/.cache/huggingface
    # GPU Settings for Windows (Comment out for Mac)
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    #   - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  miku_pgdata:
