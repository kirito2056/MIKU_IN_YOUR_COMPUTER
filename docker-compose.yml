services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: miku-postgres
    environment:
      POSTGRES_USER: miku
      POSTGRES_PASSWORD: miku
      POSTGRES_DB: miku
    ports:
      - "5432:5432"
    volumes:
      - miku_pgdata:/var/lib/postgresql/data
      # 최초 볼륨 생성 시 schema/*.sql 자동 실행
      - ./backend/db/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miku -d miku"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  miku-backend:
    build: ./backend
    container_name: miku-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://miku:miku@postgres:5432/miku
    volumes:
      - ./backend:/app
      - ./assets:/app/assets
      # Windows: %USERPROFILE%\.cache\huggingface
      - ${USERPROFILE}/.cache/huggingface:/root/.cache/huggingface
    # GPU (Docker Desktop + WSL2 + NVIDIA Container Toolkit 설정 후)
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  miku_pgdata:
